<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель администратора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 {
            color: #1a1a2e;
            font-size: 26px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2:before {
            content: "👑";
            font-size: 28px;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            color: #1a1a2e;
            border: 1px solid #e2e8f0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #10b981;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #059669;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-view {
            background: #3b82f6;
            color: white;
            border: none;
        }

        .btn-view:hover {
            background: #2563eb;
        }

        .btn-edit {
            background: #f59e0b;
            color: white;
            border: none;
        }

        .btn-edit:hover {
            background: #d97706;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        .add-button {
            margin-bottom: 25px;
            padding: 12px 24px;
            font-size: 14px;
        }

        .table-wrapper {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 16px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fafbfc;
        }

        .user-id {
            font-weight: 600;
            color: #475569;
        }

        .user-username {
            font-weight: 500;
            color: #1a1a2e;
        }

        .empty-message {
            text-align: center;
            padding: 60px 40px;
            color: #94a3b8;
            font-size: 16px;
        }

        .roles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .role-badge {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        .more-roles {
            display: inline;
        }

        .toggle-roles-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.2s;
            margin-left: 4px;
        }

        .toggle-roles-btn:hover {
            background: #e0e7ff;
        }

        .hidden-roles {
            display: none;
        }

        .hidden-roles.show {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .age-badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 13px;
            color: #475569;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Панель администратора</h2>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">🚪 Выйти</button>
        </form>
    </div>

    <a th:href="@{/admin/add}" class="btn btn-primary add-button">➕ Добавить пользователя</a>

    <div th:if="${users == null or users.empty}" class="empty-message">
        📭 Нет пользователей
    </div>

    <div class="table-wrapper" th:if="${users != null and not users.empty}">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Логин</th>
                <th>Имя</th>
                <th>Фамилия</th>
                <th>Возраст</th>
                <th>Роли</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user, userStat : ${users}">
                <td><span class="user-id" th:text="${user.id}">1</span></td>
                <td><span class="user-username" th:text="${user.username}">admin</span></td>
                <td th:text="${user.name}">Владимир</td>
                <td th:text="${user.surname}">Калинин</td>
                <td><span class="age-badge" th:text="${user.age}">25</span></td>
                <td>
                    <div class="roles-container">
                        <span th:each="role, iterStat : ${user.roles}"
                              th:if="${iterStat.index < 2}">
                            <span class="role-badge" th:text="${role.name}">ROLE_USER</span>
                        </span>

                        <th:block th:if="${user.roles.size() > 2}">
                            <div class="more-roles">
                                <div class="hidden-roles" th:id="'hidden-roles-' + ${userStat.index}">
                                    <span th:each="role, iterStat : ${user.roles}"
                                          th:if="${iterStat.index >= 2}">
                                        <span class="role-badge" th:text="${role.name}">ROLE_USER</span>
                                    </span>
                                </div>
                                <button type="button"
                                        class="toggle-roles-btn"
                                        th:attr="onclick='toggleRoles(' + ${userStat.index} + ')'"
                                        th:id="'toggle-btn-' + ${userStat.index}">
                                    +<span th:text="${user.roles.size() - 2}">0</span>
                                </button>
                            </div>
                        </th:block>
                    </div>
                </td>
                <td>
                    <div class="action-buttons">
                        <a th:href="@{/user/{username}(username=${user.username})}"
                           class="btn btn-view">👁️ Просмотр</a>
                        <a th:href="@{/admin/edit/{id}(id=${user.id})}"
                           class="btn btn-edit">✏️ Ред.</a>
                        <form th:action="@{/admin/delete/{id}(id=${user.id})}"
                              method="post" style="display:inline;">
                            <button type="submit" class="btn btn-delete"
                                    th:attr="onclick='return confirm(\'Удалить пользователя ' + ${user.username} + '?\')'">
                                🗑️ Удалить
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function toggleRoles(userIndex) {
        const hiddenRoles = document.getElementById('hidden-roles-' + userIndex);
        const toggleBtn = document.getElementById('toggle-btn-' + userIndex);
        const hiddenCount = hiddenRoles.children.length;

        if (hiddenRoles.classList.contains('show')) {
            hiddenRoles.classList.remove('show');
            toggleBtn.innerHTML = '+' + hiddenCount;
        } else {
            hiddenRoles.classList.add('show');
            toggleBtn.textContent = '−';
        }
    }
</script>
</body>
</html>
